# ============================================================
# ModSecurity Hardening Rules for WordPress on CyberPanel v1.0
# By Karanbir Singh | DigmLabs.com
# ============================================================

# Block directory traversal attempts
SecRule REQUEST_URI|ARGS "@rx ../" "id:100100,phase:2,t:urlDecodeUni,t:normalizePath,t:lowercase,deny,status:403,log,msg:'Directory traversal attempt blocked'"

# Block execution of PHP files inside uploads folder
SecRule REQUEST_URI "@rx ^/wp-content/uploads/.*.php$" "id:100002,phase:2,deny,status:403,msg:'PHP execution attempt in uploads blocked'"

# Block upload of dangerous file types
SecRule FILES_NAMES "@rx .(php|phtml|php3|php4|php5|phar)$" "id:100003,phase:2,deny,status:403,msg:'Malicious file upload blocked'"

# Detect common webshell payloads
SecRule ARGS|REQUEST_BODY "@rx (base64_decode|gzinflate|shell_exec|eval(|assert()" "id:100004,phase:2,deny,status:403,msg:'Webshell payload detected'"

# Protect wp-config.php
SecRule REQUEST_URI "@contains wp-config.php" "id:100005,phase:1,deny,status:403,msg:'Access to wp-config blocked'"

# Block access to sensitive files
SecRule REQUEST_URI "@rx (.env|.git|.htaccess|.htpasswd)" "id:100006,phase:1,deny,status:403,msg:'Sensitive file access blocked'"

# Block XML-RPC (disable only if not needed)
SecRule REQUEST_URI "@streq /xmlrpc.php" "id:100007,phase:1,deny,status:403,msg:'XMLRPC access blocked'"

# Block malicious scanners
SecRule REQUEST_HEADERS:User-Agent "@rx (sqlmap|nikto|curl|wget|python|libwww)" "id:100008,phase:1,deny,status:403,msg:'Malicious scanner blocked'"

# Block direct access to wp-includes PHP files
SecRule REQUEST_URI "@rx ^/wp-includes/.*.php$" "id:100009,phase:1,deny,status:403,msg:'Direct access to wp-includes PHP blocked'"

# Block POST requests to uploads directory
SecRule REQUEST_URI "@contains /wp-content/uploads/" "chain,id:100010,phase:2,deny,status:403,msg:'POST request to uploads blocked'"
SecRule REQUEST_METHOD "POST"

# Lower OWASP anomaly threshold
SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=5"

# Force blocking behavior
SecDefaultAction "phase:2,deny,status:403,log"

# Block ThinkPHP RCE attempts
SecRule REQUEST_URI "@contains think\app\invokefunction" "id:100200,phase:2,deny,status:403,msg:'ThinkPHP RCE attempt blocked'"

# Block known malicious bots
SecRule REQUEST_HEADERS:User-Agent "@rx (libredtail-http|python-requests)" "id:100201,phase:1,deny,status:403,msg:'Malicious bot blocked'"

# ================================
# END OF RULES
# ================================
